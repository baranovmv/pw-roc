# WirePlumber configuration for headless / container CI.
#
# This file is placed at ~/.config/wireplumber/wireplumber.conf and overrides
# the system default (/usr/share/wireplumber/wireplumber.conf).
#
# The only difference from the upstream default is that bluetooth.lua is
# omitted from wireplumber.components: BlueZ is not running in a container,
# and the Bluetooth scripts would produce a stream of D-Bus "service not found"
# errors that obscure real diagnostics.
#
# main.lua  — loads main.lua.d/* scripts (ALSA/v4l2/libcamera monitors run but
#             find no hardware and produce no device nodes; harmless).
# policy.lua — loads policy.lua.d/10-default-policy.lua which implements the
#             PW_KEY_TARGET_OBJECT / node.target stream-linking logic the
#             integration tests depend on.

context.properties = {
    log.level                  = 2
    wireplumber.script-engine  = lua-scripting
}

context.spa-libs = {
    api.alsa.*      = alsa/libspa-alsa
    audio.convert.* = audioconvert/libspa-audioconvert
    support.*       = support/libspa-support
}

context.modules = [
    { name = libpipewire-module-rt              flags = [ ifexists nofail ] }
    { name = libpipewire-module-protocol-native }
    { name = libpipewire-module-client-node }
    { name = libpipewire-module-client-device }
    { name = libpipewire-module-adapter }
    { name = libpipewire-module-metadata }
    { name = libpipewire-module-session-manager }
    { name = libpipewire-module-spa-node-factory }
]

wireplumber.components = [
    { name = libwireplumber-module-lua-scripting, type = module }
    { name = main.lua,   type = config/lua }
    { name = policy.lua, type = config/lua }
    # bluetooth.lua intentionally omitted (no BlueZ in container)
]
