name: "build"

on:
  push:
    branches:
      - main
      - ci_tests

  pull_request:

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  linux-x86_64:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        image:
          - tarabah/env-ubuntu:24.04
          - tarabah/env-ubuntu:26.04
          - tarabah/env-debian:bookworm
          - tarabah/env-debian:trixie
          - tarabah/env-fedora
          - tarabah/env-archlinux
          - tarabah/env-opensuse
          - tarabah/env-alpine

    name: x86_64/${{ matrix.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compute artifact name
        run: |
          slug=$(echo '${{ matrix.image }}' \
              | sed -E 's|^[^/]+/env-||; s|:|-|g; s|[^A-Za-z0-9._-]+|-|g')
          echo "ARTIFACT_NAME=pw-roc-x86_64-${slug}" >> "$GITHUB_ENV"

      - name: Pull image
        run: docker pull ${{ matrix.image }}

      - name: Build and test
        run: |
          ci/docker.sh ${{ matrix.image }} ci/build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: build/dist/${{ env.ARTIFACT_NAME }}.tar.gz
          if-no-files-found: error

  linux-arm64:
    runs-on: ubuntu-24.04-arm

    strategy:
      fail-fast: false
      matrix:
        image:
          - tarabah/env-ubuntu:24.04
          - tarabah/env-ubuntu:26.04
          - tarabah/env-debian:bookworm
          - tarabah/env-debian:trixie
          - tarabah/env-rpios-trixie

    name: arm64/${{ matrix.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compute artifact name
        run: |
          slug=$(echo '${{ matrix.image }}' \
              | sed -E 's|^[^/]+/env-||; s|:|-|g; s|[^A-Za-z0-9._-]+|-|g')
          echo "ARTIFACT_NAME=pw-roc-arm64-${slug}" >> "$GITHUB_ENV"

      - name: Pull image
        run: docker pull ${{ matrix.image }}

      - name: Build and test
        run: |
          ci/docker.sh ${{ matrix.image }} ci/build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: build/dist/${{ env.ARTIFACT_NAME }}.tar.gz
          if-no-files-found: error
